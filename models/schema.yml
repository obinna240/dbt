version: 2

models:

  - name: dim_listings_w_hosts
    columns:
      - name: room_type
        tests:
          - dbt_expectations.expect_column_to_exist
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: string
              config:
                severity: warn
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^\\\\d+(\\\\.\\\\d+)?$"

         

  - name: dim_listings_cleansed
    columns:
      - name: listing_id
        tests:
          - unique
          - not_null

      - name: host_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_hosts_cleansed')
              field: host_id

      - name: room_type
        tests:
          - accepted_values:
              values: ['Entire home/apt',
              'Private room',
              'Shared room',
              'Hotel room']



    



